<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takomi v6 - Project Selector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            takomi: { bg: '#0C0C0D', surface: '#151516', elevated: '#1E1E1F', accent: '#FACC15', accentMuted: 'rgba(250, 204, 21, 0.15)', file: '#94A3B8', folder: '#FACC15' }
          },
        }
      }
    };
  </script>
  <style>
    body { background-color: #0C0C0D; color: #F8FAFC; overflow: hidden; }
    .project-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .project-card:hover { transform: translateY(-4px); border-color: rgba(250, 204, 21, 0.3); background-color: #1E1E1F; }
    .glass-overlay { background: radial-gradient(circle at center, rgba(250, 204, 21, 0.03) 0%, transparent 70%); }
  </style>
</head>
<body class="h-screen flex items-center justify-center relative">
  <div class="absolute inset-0 glass-overlay pointer-events-none"></div>

  <main class="w-full max-w-4xl px-8 space-y-12 relative z-10">
    <!-- Header -->
    <div class="text-center space-y-4">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-takomi-accent text-takomi-bg mb-4 shadow-2xl">
        <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5" />
        </svg>
      </div>
      <h1 class="text-4xl font-bold tracking-tight">Welcome back, John</h1>
      <p class="text-slate-500">Select a workspace to resume orchestration.</p>
    </div>

    <!-- Search & Filter -->
    <div class="max-w-md mx-auto relative group">
       <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-500">
         <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
       </div>
       <input type="text" placeholder="Search projects..." class="w-full bg-takomi-surface border border-slate-800 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-takomi-accent transition-colors text-sm">
    </div>

    <!-- Project Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Project 1 -->
      <a href="v6-session-workspace.html" class="project-card block p-6 bg-takomi-surface border border-slate-800 rounded-2xl group">
        <div class="flex items-start justify-between mb-4">
          <div class="p-3 bg-takomi-accentMuted rounded-xl text-takomi-accent">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
          </div>
          <span class="text-[10px] font-mono text-slate-600 uppercase tracking-widest">Active 2h ago</span>
        </div>
        <h3 class="text-lg font-semibold group-hover:text-takomi-accent transition-colors">Takomi_Code</h3>
        <p class="text-sm text-slate-500 mb-6">Local orchestration engine and design system.</p>
        <div class="flex items-center gap-4 text-[11px] font-mono text-slate-400">
           <span class="flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div> main</span>
           <span class="flex items-center gap-1.5"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg> ws-a8b2</span>
        </div>
      </a>

      <!-- Project 2 -->
      <div class="project-card block p-6 bg-takomi-surface border border-slate-800 rounded-2xl group cursor-pointer opacity-70 hover:opacity-100">
        <div class="flex items-start justify-between mb-4">
          <div class="p-3 bg-slate-800 rounded-xl text-slate-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
          </div>
          <span class="text-[10px] font-mono text-slate-600 uppercase tracking-widest">Active 3d ago</span>
        </div>
        <h3 class="text-lg font-semibold transition-colors">Personal_Stuff</h3>
        <p class="text-sm text-slate-500 mb-6">Archived experiments and tool prototypes.</p>
        <div class="flex items-center gap-4 text-[11px] font-mono text-slate-400">
           <span class="flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div> production</span>
        </div>
      </div>

      <!-- New Project -->
      <div class="md:col-span-2 p-6 border border-dashed border-slate-800 rounded-2xl flex items-center justify-center hover:border-slate-600 hover:bg-white/[0.02] transition-all cursor-pointer group">
        <div class="flex items-center gap-3 text-slate-500 group-hover:text-slate-300">
           <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
           <span class="text-sm font-semibold">Initialize New Project</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="absolute bottom-8 text-center w-full">
    <p class="text-[10px] font-mono text-slate-600 tracking-widest uppercase">Takomi v6.0.0-alpha • Locally Hosted</p>
  </footer>
</body>
</html>
