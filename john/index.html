<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiet Momentum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Prata&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">A tiny page for John</p>
      <h1>Build the small thing like it matters.</h1>
      <p class="lede" id="message">
        Today feels like a good day to make something neat, simple, and surprisingly calm.
      </p>

      <div class="actions">
        <button id="shuffleButton" type="button">Change the line</button>
        <span class="clock-label">Local time <strong id="clock">--:--:--</strong></span>
      </div>

      <p class="page-link-wrap">
        <a class="page-link" href="little-wins.html">Open the second page</a>
      </p>

      <div class="quote-strip">
        <span>soft colors</span>
        <span>clean motion</span>
        <span>good energy</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
